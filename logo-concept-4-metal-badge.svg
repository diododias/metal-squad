<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>METAL SQUAD</title>
<defs>
  <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3a3a3d"/>
    <stop offset="45%" stop-color="#1c1c1f"/>
    <stop offset="55%" stop-color="#232326"/>
    <stop offset="100%" stop-color="#141416"/>
  </linearGradient>
  <linearGradient id="steelText" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f0f0f2"/>
    <stop offset="55%" stop-color="#b8b8bc"/>
    <stop offset="100%" stop-color="#8a8a90"/>
  </linearGradient>
  <style>
    .brand { font-family:'IBM Plex Mono','JetBrains Mono',ui-monospace,Menlo,Consolas,monospace; font-weight:700; }
    .sub { font-family:'IBM Plex Mono','JetBrains Mono',ui-monospace,Menlo,Consolas,monospace; }
  </style>
</defs>
<rect width="900" height="420" fill="#0a0a0b"/>

<polygon points="90,60 780,60 820,100 820,320 780,360 90,360 50,320 50,100"
  fill="url(#steel)" stroke="#4a4a4e" stroke-width="2"/>

<g opacity="0.12" stroke="#ffffff" stroke-width="1">
  <line x1="60" y1="90" x2="810" y2="90"/>
  <line x1="60" y1="140" x2="810" y2="140"/>
  <line x1="60" y1="190" x2="810" y2="190"/>
  <line x1="60" y1="280" x2="810" y2="280"/>
  <line x1="60" y1="330" x2="810" y2="330"/>
</g>

<circle cx="90" cy="90" r="6" fill="#0a0a0b" stroke="#5a5a5e" stroke-width="1.5"/>
<circle cx="780" cy="90" r="6" fill="#0a0a0b" stroke="#5a5a5e" stroke-width="1.5"/>
<circle cx="90" cy="330" r="6" fill="#0a0a0b" stroke="#5a5a5e" stroke-width="1.5"/>
<circle cx="780" cy="330" r="6" fill="#0a0a0b" stroke="#5a5a5e" stroke-width="1.5"/>

<polygon points="435,120 470,150 435,180 400,150" fill="none" stroke="#5fa8bf" stroke-width="3"/>
<polygon points="435,132 458,150 435,168 412,150" fill="#5fa8bf" opacity="0.25"/>

<text class="brand" x="450" y="255" font-size="58" fill="url(#steelText)" text-anchor="middle" letter-spacing="6">METAL</text>
<text class="brand" x="450" y="305" font-size="58" fill="url(#steelText)" text-anchor="middle" letter-spacing="6">SQUAD</text>

<g transform="translate(450,320)">
  <polygon points="-90,10 -60,0 -30,10 -60,20" fill="#d1b34a"/>
  <polygon points="-20,10 10,0 40,10 10,20" fill="#5fa8bf"/>
  <polygon points="50,10 80,0 110,10 80,20" fill="#d1615f" opacity="0.7"/>
</g>

<text class="sub" x="450" y="345" font-size="12" fill="#7a7a80" text-anchor="middle" letter-spacing="3">msq :: AI ORCHESTRATION UNIT</text>
</svg>
