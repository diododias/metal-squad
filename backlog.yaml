          - docs/features/F32-web-mode.md
          - docs/features/F34-web-run-detail-and-control-polish.md
          - docs/features/F36-web-feature-config-persistence.md
          - src/web/server.ts
          - src/web/static/app.js
          - src/web/static/components/Gates.js
          - src/web/static/components/RunDetail.js
          - src/web/static/components/FeaturePreview.js
        dependsOn: []
