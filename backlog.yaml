            - implement
            - validate
          approvals:
            channel: telegram
            autoAdvance: true
          syncTasksToBacklog: true
      - id: feat-43
        title: F03 — Dynamic Prompt Builder
        spec: >
          Problema: a montagem de prompt para os adapters ainda tem trechos
          hardcoded herdados do spec-kit, em vez de compor dinamicamente a
          partir de skills resolvidas pelo registry (F02) e do schema v2 (F01).

          Objetivo: generalizar src/core/backlog/prompt.ts para montar o prompt
          final a partir de skills/stageSkills resolvidas dinamicamente, sem
          acoplamento a um fluxo especifico de spec-kit.

          Escopo esperado: src/core/backlog/prompt.ts, integracao com
          src/core/skills/ (F02).

          Validacao: prompts existentes (staged workflow, F27) continuam
          funcionando sem regressao; npm run build, npm test e npm run typecheck
          passam.
        tool: codex
        model: gpt-5.4
        effort: medium
        skills:
          - dev-flow
        specFile: docs/features/F03-dynamic-prompt-builder.md
        context:
          - docs/features/F03-dynamic-prompt-builder.md
          - docs/features/F01-yaml-schema-v2.md
          - docs/features/F02-skill-registry.md
          - docs/ROADMAP.md
          - .claude/rules/architecture.md
          - src/core/backlog/prompt.ts
          - src/core/skills/
        dependsOn:
