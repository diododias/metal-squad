  - id: e17-modo-automatico
    title: E — Modo Automatico
    features:
      - id: feat-61
        title: F45 — Piloto Automatico (Auto-Pilot de Backlog)
        spec: >
          Problema: hoje o disparo de uma nova feature e manual. O pedido e um
          modo piloto automatico: ao concluir uma feature, iniciar
          automaticamente a proxima elegivel sem dependencia pendente; se uma
          feature travar (gate pendente ou falha que nao seja de budget/token),
          pular para a proxima demanda elegivel em vez de ficar parado; isso so
          vale para demandas marcadas explicitamente como auto-exec.

          Objetivo: adicionar ao orchestrator um loop reativo de 'o que iniciar
          a seguir', disparado por eventos de conclusao/falha/bloqueio,
          respeitando uma flag por feature de execucao automatica.

          Escopo esperado (investigacao no specify antes de codificar):
          src/core/orchestrator/ (loop sobre o scheduler existente),
          src/core/events/ (gatilho via run:done/run:failed/run:blocked),
          src/core/backlog/ (novo campo autoStart ou similar por feature).

          Validacao: conclusao de uma feature auto-exec dispara a proxima
          elegivel automaticamente; bloqueio/falha nao-budget pula para a
          proxima demanda auto- exec; demandas sem a flag continuam so manuais;
          npm run build, npm test e npm run typecheck passam.
        tool: codex
        model: gpt-5.4
        effort: high
        skills:
          - dev-flow
        specFile: docs/features/F45-piloto-automatico.md
        context:
          - docs/features/F45-piloto-automatico.md
