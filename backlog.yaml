  - id: e18-skills-customization
    title: E — Skills
    features:
      - id: feat-62
        title: F46 — Prompt/Skill Customizado por Step
        spec: >
          Problema: skills sao resolvidas por precedence global (repo > global >
          external > builtin), sem mecanismo claro de skill/prompt extra que
          guie especificamente um step de uma feature.

          Objetivo: permitir associar uma skill ou prompt extra a um step
          especifico de uma feature, reaproveitando o skill registry (F02)
          quando possivel em vez de criar um path paralelo de resolucao.

          Escopo esperado (investigacao no specify antes de codificar):
          src/core/skills/ (discovery/resolve, sem duplicar precedence),
          src/core/backlog/ (schema para associar skill/prompt por step),
          src/core/backlog/prompt.ts (injecao do prompt customizado, F03).

          Validacao: step com skill/prompt customizado usa esse conteudo na
          montagem final do prompt sem quebrar steps sem customizacao; npm run
          build, npm test e npm run typecheck passam.
        tool: codex
        model: gpt-5.4
        effort: medium
        skills:
          - dev-flow
        specFile: docs/features/F46-custom-prompt-per-step.md
        context:
          - docs/features/F46-custom-prompt-per-step.md
          - docs/features/F02-skill-registry.md
          - docs/features/F03-dynamic-prompt-builder.md
          - docs/ROADMAP.md
          - .claude/rules/architecture.md
          - src/core/skills/
          - src/core/backlog/
        dependsOn: []
        retry:
          maxAttempts: 1
          backoffMs: 5000
          onFail: stop
        workflow:
          mode: staged
          stages:
            - specify
            - plan
            - tasks
            - implement
            - validate
          approvals:
            channel: telegram
            autoAdvance: true
          syncTasksToBacklog: true
