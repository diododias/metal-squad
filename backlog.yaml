version: 2
repo: metal-squad
defaults:
  tool: claude
  effort: medium
  skills: []

epics:
  - id: epic-modern-tui
    title: E02 — Modern TUI
    features:
      - id: feat-05
        title: F05 — Layout Multi-Painel
        tool: codex
        model: gpt-5.4
        effort: high
        skills: [implement, test]
        specFile: docs/features/F05-layout-multi-panel.md
        context:
          - docs/epics/E02-modern-tui.md
          - docs/features/F07-status-bar.md
          - docs/features/F08-session-navigation.md
          - docs/features/F09-command-palette.md
          - docs/features/F24-task-stage-progress.md
          - src/commands/ui.ts
          - src/ui/App.tsx
          - src/ui/components/MainPanel.tsx
          - src/ui/components/Sidebar.tsx
          - src/ui/components/StatusBar.tsx
          - src/ui/components/CommandBar.tsx
          - src/ui/hooks/useRuns.ts
          - src/ui/hooks/useGates.ts
          - tests/ui/app.test.ts
          - tests/ui/components.test.ts
        dependsOn: []
        spec: |
          Desenvolva a feature F05 — Layout Multi-Painel usando Codex como executor e o modelo gpt-5.4.

          Fluxo obrigatório:
          1. Refine a spec executável da feature se necessário.
          2. Implemente o novo shell da TUI diretamente neste checkout.
          3. Atualize os testes da UI e valide a responsividade por largura de terminal.
          4. Rode testes e typecheck ao final.

          Escopo funcional:
          - Introduzir layout multi-painel com painel principal, sidebar, status bar e command bar.
          - Tornar a TUI responsiva para larguras <80, 80-119 e >=120 colunas.
          - Adicionar navegação por teclado entre painéis com foco explícito e seleção de run.
          - Mostrar contexto útil do run selecionado mesmo antes do log streaming da F06.
          - Exibir skills declaradas do feature selecionado usando o backlog atual como metadado.
          - Preservar o comportamento existente de gates e quit.
          - Cobrir o novo contrato do App e dos componentes em testes automatizados.

          Criterios de aceite:
          - Existe layout multi-painel com sidebar + main + status bar + command bar.
          - A TUI reage a larguras pequenas, médias e grandes.
          - A navegação por Tab, setas/j/k, Enter e Esc funciona no App.
          - O painel principal mostra overview ou detalhe contextual do run selecionado.
          - Testes automatizados e typecheck passam ao final.
        tasks: []

  - id: epic-skills-system
    title: E01 — Skills System
    features:
      - id: feat-03
        title: F03 — Dynamic Prompt Builder
        tool: codex
        model: gpt-5.4
        effort: medium
        skills: [implement, test]
        specFile: docs/features/F03-dynamic-prompt-builder.md
        context:
          - docs/epics/E01-skills-system.md
          - docs/features/F01-yaml-schema-v2.md
          - docs/features/F02-skill-registry.md
          - docs/features/F03-dynamic-prompt-builder.md
          - src/core/backlog/prompt.ts
          - src/core/runner/execute.ts
          - src/core/skills/builtin.ts
          - src/core/skills/registry.ts
          - tests/backlog/load-prompt.test.ts
          - tests/runner/execute.test.ts
        dependsOn:
          - feat-02
        spec: |
          Desenvolva a feature F03 — Dynamic Prompt Builder usando Codex como executor e o modelo gpt-5.4.

          Escopo funcional:
          - Substituir de vez o fluxo hardcoded de prompt spec-kit por um builder dinâmico baseado nas skills declaradas.
          - Renderizar skills em ordem, com placeholders para resumo da feature, spec detalhada, arquivos de contexto e tarefas.
          - Injetar `specFile`, `context` e dados de `tasks`/`taskFile` no prompt final quando disponíveis.
          - Respeitar `metadata.inputs` de cada skill para controle granular de contexto.
          - Aplicar limite configurável de contexto para evitar prompts excessivos.
          - Manter fallback compatível para `implement` quando nenhuma skill for resolvida.

          Critérios de aceite:
          - `buildPrompt` é a única rota de construção de prompt em runtime.
          - Conteúdo de `spec`, `specFile`, `context` e `taskFile` pode ser incluído no prompt.
          - Skills são renderizadas na ordem declarada.
          - O runner passa um prompt pronto aos adapters.
          - Existe cobertura automatizada para inputs filtrados, tarefas e truncamento de contexto.
        tasks: []
      - id: feat-02
        title: F02 — Skill Registry & Discovery
        tool: codex
        model: gpt-5.4
        effort: medium
        skills: [specify, plan, tasks, implement]
        specFile: docs/features/F02-skill-registry.md
        context:
          - docs/epics/E01-skills-system.md
          - docs/features/F01-yaml-schema-v2.md
          - docs/features/F02-skill-registry.md
          - docs/features/F03-dynamic-prompt-builder.md
          - src/commands/init.ts
          - src/commands/run.ts
          - src/core/backlog/load.ts
          - src/core/backlog/prompt.ts
          - src/core/backlog/schema.ts
          - src/core/adapters/index.ts
          - tests/backlog/schema.test.ts
        dependsOn: []
        spec: |
          Desenvolva a feature F02 — Skill Registry & Discovery usando Codex como executor e o modelo gpt-5.4.

          Fluxo obrigatório:
          1. Rode /speckit-specify se precisar refinar a spec executável desta feature no repositório.
          2. Rode /speckit-plan para definir a abordagem técnica.
          3. Rode /speckit-tasks para gerar ou ajustar tarefas executáveis.
          4. Rode /speckit-implement para executar a implementação completa.

          Escopo funcional:
          - Introduzir um módulo dedicado para skills em src/core/skills/ com tipos, descoberta, resolução e validação.
          - Implementar descoberta das quatro fontes exigidas pela spec:
            - built-in do msq
            - repo-level em .msq/skills/<name>/
            - global em ~/.config/metal-squad/skills/<name>/
            - external/spec-kit quando .specify/ ou .agents/skills/speckit-* existirem
          - Cada skill descoberta precisa expor nome, source, promptTemplate e metadata básica.
          - Aceitar diretórios com SKILL.md e metadata.yaml, tratando metadata ausente com defaults razoáveis.
          - Validar as skills declaradas em feature/task/defaults durante msq run e falhar cedo com mensagem clara quando houver skill faltante.
          - Adicionar um comando CLI msq skills para listar as skills disponíveis com fonte e descrição.
          - Manter compatibilidade com o schema v2 já existente e preparar base para o prompt builder dinâmico da F03 sem acoplamento extra desnecessário.

          Mudanças esperadas por área:
          - CLI:
            - adicionar comando dedicado para listar skills
            - integrar a validação de skills ao fluxo de run
          - Core/backlog:
            - resolver skills referenciadas no backlog antes da execução
            - reaproveitar defaults já propagados pelo loader
          - Core/skills:
            - criar registry com discover(cwd), resolve(names, cwd) e validate(names, cwd)
            - modelar built-ins mínimos como implement, review e test
            - detectar skills do spec-kit derivando nomes a partir de .agents/skills/speckit-* e/ou .specify
          - Testes:
            - cobrir descoberta por fonte
            - cobrir validação com skill faltante
            - cobrir listagem/saída do novo comando quando viável

          Critérios de aceite:
          - Registry descobre skills de builtin, repo, global e external.
          - msq skills lista skills disponíveis com fonte e descrição.
          - msq run acusa skill inexistente antes de tentar executar o adapter.
          - Skills spec-kit são detectadas automaticamente quando o repositório contém .specify/ ou .agents/skills/speckit-*.
          - Testes automatizados e typecheck passam ao final.
        tasks: []
