  - id: e08-notifications-interactive
    title: E08 — Interactive Notifications
    features:
      - id: feat-40
        title: F47 — Perguntas Interativas via Telegram (Botoes)
        spec: >
          Problema: quando a IA levanta uma pergunta de esclarecimento durante
          um step (ex. specify), a notificacao que chega no Telegram hoje exige
          resposta livre por texto, em vez de oferecer botoes (inline keyboard)
          com as opcoes que a propria IA apresentou. Este item depende
          diretamente de H19: hoje o sistema as vezes trata uma pergunta da IA
          como se fosse um pedido de aprovacao de gate (avancar/nao avancar), em
          vez de rotear como pergunta genuina para o Telegram — sem esse
          roteamento estar correto, nao ha "pergunta" confiavel para transformar
          em botoes.


          Objetivo: quando o sistema identificar corretamente que a IA fez uma
          pergunta (apos H19 resolver a deteccao pergunta-vs-aprovacao), a
          notificacao no Telegram deve apresentar as opcoes de resposta como
          botoes, usando o mesmo conteudo de pergunta/opcoes que a IA gerou —
          nao um "aprovar/rejeitar" generico. O usuario responde com um toque no
          botao correspondente, e essa escolha e propagada de volta ao step em
          execucao com o mesmo efeito que a resposta livre por texto teria hoje.


          Escopo esperado (mapeamento fino fica para specify/plan):
          src/core/events/ (dispatch de notificacao Telegram, suporte a inline
          keyboard e tratamento do callback do botao como resposta);
          runner/orchestrator (ponto de deteccao "pergunta vs aprovacao", owned
          por H19, e extracao das opcoes de resposta do output da IA);
          skills/prompts do step specify (e outros stages que podem gerar
          perguntas) para garantir formato de output parseavel. F47 assume H19
          resolvido antes de entrar em execucao real — implementar botoes sobre
          deteccao errada de pergunta vs aprovacao propagaria o bug com uma UI
          melhor. Avaliar tambem o problema secundario de H19 de mensagens
          truncadas no Telegram ao desenhar o texto da pergunta antes dos
          botoes.


          Validacao:

          - Uma pergunta real da IA durante specify (ou outro stage que gere
            pergunta) chega ao Telegram como mensagem com botoes
            representando as opcoes reais apresentadas pela IA, nao um
            "aprovar/rejeitar" generico.
          - Escolher um botao propaga a resposta correspondente de volta ao
            step em execucao, com o mesmo efeito observavel que a resposta
            livre por texto tem hoje.
          - Pedidos de aprovacao de gate (nao-pergunta) continuam
            funcionando como hoje, sem regressao.
          - Perguntas cujo texto ultrapassa o limite de mensagem do Telegram
            sao tratadas (split/truncamento controlado).
          - Testes cobrindo extracao de opcoes do output da IA e o dispatch
            da notificacao com inline keyboard.
          - `npm run build`, `npm test` e `npm run typecheck` passam.
        tool: codex
