version: 2
repo: metal-squad
defaults:
  tool: codex
  effort: high
  skills:
    - implement
  stageSkills:
    specify:
      - speckit-specify
    plan:
      - speckit-plan
    tasks:
      - speckit-tasks
    implement:
      - speckit-implement
      - dev-flow
    validate:
      - review
budget:
  maxTokens: 5000000
  maxCostUsd: 100
  perFeatureMaxTokens: 500000
epics:
  - id: e07-adaptive-session-control
    title: E07 — Adaptive Session Control
    features:
      - id: feat-39
        title: "F41 — Reaproveitamento Adaptativo de Sessao entre Steps"
        spec: >
          Problema: F27 entrega sessoes isoladas por step (uma sessao nova a
          cada stage do workflow: specify, plan, tasks, implement, validate).
          Isso e seguro mas desperdica contexto quando um step termina cedo e
          ainda sobra muita janela de contexto disponivel. Hoje nao existe
          nenhum mecanismo de decisao "reusar sessao vs abrir nova" baseado em
          consumo de contexto, nem um jeito de marcar stages especificos
          (specify, plan) como "sempre isolados" independente desse
          reaproveitamento.


          Objetivo: adicionar um modo complementar as sessoes isoladas do F27
          que reaproveite a mesma sessao entre steps consecutivos quando sobra
          contexto suficiente, com dois limiares de decisao e uma flag geral
          de liga/desliga: >=70% de contexto consumido ao final de um step
          forca nova sessao no proximo step; <=50% de contexto consumido ao
          final de um step permite reaproveitar a mesma sessao no proximo
          step, se o modo estiver habilitado. A faixa 50%-70% precisa de
          clarificacao no specify. Alem do limiar global, stages especificos
          (specify, plan sao os citados pelo usuario) devem poder ser
          marcados para sempre rodar em sessao isolada, selecionavel pelo
          usuario por feature.


          Escopo esperado (mapeamento fino fica para specify/plan): decisao de
          reuso de sessao no orchestrator/adapters (hoje sempre abre sessao
          nova por stage, comportamento do F27); flag de liga/desliga do modo
          adaptativo no schema do backlog; marcacao de stages sempre-isolados
          por feature no schema do backlog; leitura da telemetria de contexto
          por sessao ja existente (F30), sem criar fonte paralela de medicao —
          atencao a H15 (contagem de tokens confusa/possivelmente incorreta),
          que pode invalidar o calculo dos limiares se nao for resolvido antes
          ou junto deste trabalho.


          Validacao:

          - Com o modo adaptativo desligado, comportamento observavel identico
            ao F27 atual (sessao nova a cada step).
          - Com o modo ligado, step que termina com <=50% de contexto
            consumido permite reaproveitar sessao no proximo step (se nao
            estiver na lista de sempre-isolados).
          - Com o modo ligado, step que termina com >=70% de contexto
            consumido sempre forca nova sessao no proximo step.
          - Stages marcados como sempre-isolados nunca reaproveitam sessao,
            independente do consumo de contexto.
          - Flag de liga/desliga e lista de stages sempre-isolados
            configuraveis por feature no backlog.
          - Testes cobrindo os dois limiares (50% e 70%) e a lista de stages
            sempre-isolados.
          - `npm run build`, `npm test` e `npm run typecheck` passam.
        tool: codex
        model: gpt-5.4
        effort: high
        skills:
          - dev-flow
        specFile: docs/features/F41-adaptive-session-reuse.md
        context:
          - docs/features/F41-adaptive-session-reuse.md
          - docs/features/F27-stage-sessions-telegram.md
          - docs/features/F30-token-context-telemetry.md
          - docs/ROADMAP.md
          - .claude/rules/architecture.md
          - src/core/adapters/
          - src/core/orchestrator/
          - src/core/backlog/
          - src/db/
        dependsOn: []
        retry:
          maxAttempts: 1
          backoffMs: 5000
          onFail: stop
        workflow:
          mode: staged
          stages:
            - specify
            - plan
            - tasks
            - implement
            - validate
          approvals:
            channel: telegram
            autoAdvance: false
          syncTasksToBacklog: true
  - id: e08-notifications-interactive
    title: E08 — Interactive Notifications
    features:
      - id: feat-40
        title: "F47 — Perguntas Interativas via Telegram (Botoes)"
        spec: >
          Problema: quando a IA levanta uma pergunta de esclarecimento durante
          um step (ex. specify), a notificacao que chega no Telegram hoje
          exige resposta livre por texto, em vez de oferecer botoes (inline
          keyboard) com as opcoes que a propria IA apresentou. Este item
          depende diretamente de H19: hoje o sistema as vezes trata uma
          pergunta da IA como se fosse um pedido de aprovacao de gate
          (avancar/nao avancar), em vez de rotear como pergunta genuina para o
          Telegram — sem esse roteamento estar correto, nao ha "pergunta"
          confiavel para transformar em botoes.


          Objetivo: quando o sistema identificar corretamente que a IA fez
          uma pergunta (apos H19 resolver a deteccao pergunta-vs-aprovacao), a
          notificacao no Telegram deve apresentar as opcoes de resposta como
          botoes, usando o mesmo conteudo de pergunta/opcoes que a IA gerou —
          nao um "aprovar/rejeitar" generico. O usuario responde com um toque
          no botao correspondente, e essa escolha e propagada de volta ao
          step em execucao com o mesmo efeito que a resposta livre por texto
          teria hoje.


          Escopo esperado (mapeamento fino fica para specify/plan):
          src/core/events/ (dispatch de notificacao Telegram, suporte a
          inline keyboard e tratamento do callback do botao como resposta);
          runner/orchestrator (ponto de deteccao "pergunta vs aprovacao",
          owned por H19, e extracao das opcoes de resposta do output da IA);
          skills/prompts do step specify (e outros stages que podem gerar
          perguntas) para garantir formato de output parseavel. F47 assume
          H19 resolvido antes de entrar em execucao real — implementar
          botoes sobre deteccao errada de pergunta vs aprovacao propagaria o
          bug com uma UI melhor. Avaliar tambem o problema secundario de H19
          de mensagens truncadas no Telegram ao desenhar o texto da pergunta
          antes dos botoes.


          Validacao:

          - Uma pergunta real da IA durante specify (ou outro stage que gere
            pergunta) chega ao Telegram como mensagem com botoes
            representando as opcoes reais apresentadas pela IA, nao um
            "aprovar/rejeitar" generico.
          - Escolher um botao propaga a resposta correspondente de volta ao
            step em execucao, com o mesmo efeito observavel que a resposta
            livre por texto tem hoje.
          - Pedidos de aprovacao de gate (nao-pergunta) continuam
            funcionando como hoje, sem regressao.
          - Perguntas cujo texto ultrapassa o limite de mensagem do Telegram
            sao tratadas (split/truncamento controlado).
          - Testes cobrindo extracao de opcoes do output da IA e o dispatch
            da notificacao com inline keyboard.
          - `npm run build`, `npm test` e `npm run typecheck` passam.
        tool: codex
        model: gpt-5.4
        effort: high
        skills:
          - dev-flow
        specFile: docs/features/F47-telegram-interactive-questions.md
        context:
          - docs/features/F47-telegram-interactive-questions.md
          - docs/features/F19-notifications-v2.md
          - docs/features/F27-stage-sessions-telegram.md
          - docs/ROADMAP.md
          - .claude/rules/architecture.md
          - src/core/events/
          - src/core/orchestrator/
        dependsOn: []
        retry:
          maxAttempts: 1
          backoffMs: 5000
          onFail: stop
        workflow:
          mode: staged
          stages:
            - specify
            - plan
            - tasks
            - implement
            - validate
          approvals:
            channel: telegram
            autoAdvance: false
          syncTasksToBacklog: true
