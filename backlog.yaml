    features:
      - id: feat-38
        title: "F38 — Live Output: Hierarquia Visual e Cores Mutadas"
        spec: >
          Problema: no painel "Live Output" do detalhe de run (dashboard web),
          cada evento de tool call vira um bloco full-width com borda e fundo
          solido (`renderOutputEntry` em
          `src/web/static/components/RunDetail.js:139-145`, classe
          `.output-entry.tool` em `src/web/static/styles.css:598-604` com
          `border` + `background: var(--panel)`). A chamada em
          `RunDetail.js:515` passa `maxWidth=1000` para todas as entries, entao
          o bloco de tool nao e limitado por largura e estica borda-a-borda do
          container `.output-log`. Isso cria dois problemas: (1) blocos de tool
          competem visualmente com a narrativa/"thinking" do agente — entries
          default (`RunDetail.js:160-164`) renderizam so como texto plano sem
          borda/fundo, entao o card de tool acaba chamando mais atencao que o
          raciocinio do agente, invertendo a prioridade esperada; (2) a paleta
          `var(--panel)` (`#111827`) / `var(--border)` (`#374151`) tem pouco
          contraste com `var(--text)` (`#e5e7eb`), entao o bloco de tool nao
          parece "secundario" o suficiente — CLIs de mercado usam linha
          compacta, label curto e cor apagada para tool calls, sem card
          full-width com fundo proprio.


          Objetivo: redesenhar a apresentacao das entries de tool no Live Output
          para ocupar menos espaco horizontal (nao esticar borda a borda do
          container), usar cores mais mutadas que o texto de narrativa do
          agente, e ficar mais proximo do padrao visual de CLIs de mercado — sem
          alterar o que e mostrado, so como e mostrado. Fora de escopo: fonte de
          dados do live output (WebSocket, `outputLines`), fila/paginacao ou
          comportamento de streaming, e a TUI Ink
          (`src/ui/components/MainPanel.tsx`), que tem um `ERR> ` parecido mas
          nao faz parte deste pedido.


          Escopo esperado:

          - `src/web/static/components/RunDetail.js`: ajustar
            `renderOutputEntry` (linhas 137-165) para limitar a largura
            efetiva das entries de tool (hoje `maxWidth=1000` na chamada de
            `RunDetail.js:515`, sem truncamento real) e/ou trocar a estrutura
            do elemento para nao ocupar 100% da largura do container mesmo
            com texto curto.
          - `src/web/static/styles.css`: em `.output-entry.tool` (linhas
            598-604), trocar `background: var(--panel)` / `border: 1px solid
            var(--border)` por um tratamento mais discreto (ex.: sem fundo
            solido, `color: var(--muted)` como ja usado em `.output-entry.heartbeat`,
            linhas 606-609, com indicador leve tipo borda esquerda fina ou
            prefixo) — objetivo e contraste visivelmente mais baixo que o
            texto default usado pela narrativa do agente.
          - Preservar hierarquia entre fontes: narrativa (default,
            `var(--text)`) mais visivel; `stderr` (`var(--danger)`) mais
            visivel (erro deve continuar chamando atencao); `tool` mutado e
            compacto; `heartbeat` ja mutado/italico, sem mudanca.


          Validacao:

          - Entries de tool no Live Output nao esticam mais borda-a-borda do
            container `.output-log`.
          - Entries de tool usam cor visivelmente mais apagada que o texto
            de narrativa do agente (contraste reduzido, comparavel a
            `heartbeat`).
          - Narrativa do agente mantem o contraste atual (`var(--text)`),
            sem regressao de legibilidade; `stderr` mantem
            `var(--danger)`.
          - Nenhuma mudanca em `outputLines`/streaming/websocket — so
            apresentacao.
          - `npm run build` e `npm run typecheck` passam.
        tool: claude
        effort: medium
        skills:
          - dev-flow
        specFile: docs/features/F38-live-output-visual-hierarchy.md
        context:
          - docs/features/F38-live-output-visual-hierarchy.md
          - docs/features/F34-web-run-detail-and-control-polish.md
          - docs/ROADMAP.md
          - src/web/static/components/RunDetail.js
          - src/web/static/styles.css
          - src/web/lib/format.js
        dependsOn: []
        retry:
