epics:
  - id: e03-orchestration-v2
    title: E03 — Orchestration v2
    features:
      - id: feat-39
        title: F39 — Adapter Fallback em Retry + Resume no Step que Falhou
        spec: >
          Problema: hoje, quando um adapter falha (crash, timeout, rate limit)
          ou

          estoura budget (maxTokens global ou perFeatureMaxTokens), o msq so
          sabe

          reexecutar a feature com o mesmo tool/model (runWithRetry em

          src/core/runner/execute.ts:456-493 resolve getAdapter(feature.tool)
          uma

          unica vez antes do loop de tentativas). Quando o budget estoura,
          apenas

          pausa a pipeline ou cria gate manual, sem oferecer caminho de
          continuar

          com outra ferramenta. Ao reexecutar via `msq resume <target>`, o msq

          reconstroi o estado a partir do snapshot persistido
          (done/pending/active/

          aborted em `pipelines`), mas nao ha forma de dizer "continue essa run

          especifica, porem com outro tool/model, apenas no step que ficou

          pendente". Alem disso, `updateRunUsage()` (src/db/repo.ts:99-105)

          SOBRESCREVE `runs.input_tokens/output_tokens/total_tokens` a cada

          chamada em vez de acumular — entao se uma tentativa falha e outra e

          refeita no mesmo runId, o custo real acumulado (incluindo a tentativa

          que falhou) nao fica visivel na tabela `runs`, so espalhado em linhas

          avulsas de `token_usage`.


          Objetivo: permitir que, quando uma feature falha (esgotou

          retry.maxAttempts) ou atinge limite de budget, o operador possa trocar

          tool e/ou model/effort e retomar A MESMA run/pipeline, reexecutando

          SOMENTE o step (stage/task) que ficou pendente, sem gerar uma run nova

          do zero e sem perder o rastreio de tokens — incluindo os tokens ja

          gastos pela tentativa que falhou.


          Escopo esperado:

          - Estender `RetrySchema` (src/core/backlog/schema.ts:8-12) com lista
            opcional `fallback: [{ tool, model?, effort?, maxAttempts? }]`,
            tentada em ordem apos o tool primario esgotar maxAttempts
          - `runWithRetry` (src/core/runner/execute.ts) passa a iterar attempt
            specs (primario + fallback), resolvendo `getAdapter(spec.tool)` por
            spec e construindo um `Feature` efetivo (clone com tool/model/effort
            sobrescritos) sem mutar o objeto compartilhado pelo scheduler
          - `retry_history` (src/db/index.ts:143-149) ganha colunas
          `tool`/`model`
            para auditar qual adapter rodou em cada tentativa
          - Resolucao de gate de budget passa a aceitar tool/model como uma das
            formas de resolucao, reusando a mesma infra do fallback de retry
          - `msq resume <target>` (src/commands/resume.ts) ganha flags opcionais
            `--tool`, `--model`, `--effort` aplicadas como override PONTUAL da
            retomada (nao reescreve backlog.yaml nem o catalogo persistido)
          - O resume com override continua usando o MESMO runId/pipelineId da
            execucao original — nao cria run nova para trabalho ja concluido —
            e reaproveita `determineStageStartIndex` para so reexecutar o
            stage/task que estava `running`/`failed`, sem repetir stages `done`
            do workflow staged (specify/plan/tasks/...)
          - Corrigir `updateRunUsage()` (src/db/repo.ts:99-105) para ACUMULAR
            tokens entre tentativas de um mesmo runId (hoje sobrescreve); ajustar
            leitura em `src/core/stats.ts` e `src/core/budget/tracker.ts` para
            refletirem o total real gasto na run, incluindo tentativas que
            falharam antes do fallback
          - TUI/`msq status` passam a expor qual tool/model foi usado em cada
            tentativa (leitura de retry_history) e o total de tokens acumulado
            da run


          Validacao:

          - Uma feature com `retry.fallback` configurado, ao esgotar maxAttempts

          no tool primario, tenta automaticamente o proximo tool da lista antes

          de aplicar onFail

          - `msq resume <target> --tool <outro> --model <outro>` retoma a mesma

          run/pipeline sem criar run nova para o trabalho ja concluido

          - Ao retomar apos falha, apenas o stage/task que tinha falhado e

          reexecutado — stages ja done no workflow staged nao rodam de novo

          - O total de tokens da run (runs.total_tokens e o que TUI/status

          exibem) inclui os tokens gastos pela(s) tentativa(s) que falharam
          antes

          do fallback, nao so a tentativa final bem-sucedida

          - retry_history registra tool/model usados em cada tentativa

          - Existe teste cobrindo: tentativa 1 falha com codex, fallback para

          claude/effort medium sucede, e o total de tokens reportado soma as

          duas tentativas
