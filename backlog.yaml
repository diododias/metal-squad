          Objetivo: introduzir blocos de contexto por task, integrados ao task
          sizer (F04, entregue) e a telemetria de token/context (F30, entregue),
          sem criar fonte paralela de medicao.

          Escopo esperado: src/core/backlog/, src/core/events/, integracao com
          F16/F17 (analytics, entregues).

          Validacao: analytics refletem consumo por bloco sem duplicar contagem
          existente; npm run build, npm test e npm run typecheck passam.
