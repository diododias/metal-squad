        spec: >
          Problema: o catalogo de epics/features/tasks so existe hoje no
          backlog.yaml; o runtime nao le do banco, o que limita edicao
          persistente (ver F36, ja entregue no lado web) e leitura consistente
          entre TUI/web/CLI.

          Objetivo: fazer o runtime do msq ler o catalogo primariamente do
          SQLite (populado via `msq backlog load`), com o YAML como fonte de
          importacao/versionamento em vez de fonte de leitura direta em cada
          comando.

          Escopo esperado: src/db/backlogCatalog.ts, src/core/backlog/load.ts,
          comandos que hoje leem backlog.yaml diretamente.

          Validacao: `msq run`/`msq status`/`msq ui` refletem o catalogo do
          banco apos `backlog load`; npm run build, npm test e npm run typecheck
          passam.
        tool: codex
        model: gpt-5.4
