epics:
  - id: e06-web-version
    title: E06 — Web Version
    features:
      - id: feat-38
        title: F38 — Web Action State Auto Refresh
        spec: >
          Problema: no modo web, depois de acoes como start, stop, approve, skip

          e retry, a tela nao reflete o novo estado automaticamente. O usuario

          precisa dar refresh manual para enxergar o que acabou de acontecer.


          Objetivo: corrigir a reatividade do modo web para que qualquer acao de

          controle atualize o estado visivel da interface logo apos a resposta
          do

          backend, sem exigir reload da pagina.


          Escopo esperado:

          - start/stop/abort/resume/pause atualizam dashboard, detalhe da run,
            cards e botoes logo apos a acao
          - approve/skip/retry de gates e stage requests atualizam a UI sem
            refresh manual
          - ao iniciar uma task/feature, ela deixa de aparecer na coluna de
            backlog/TODO e avanca automaticamente para a proxima coluna
            correspondente ao estado real da execucao
          - a sincronizacao deve acontecer tanto para a aba/visao atual quanto
            para qualquer estado compartilhado derivado do mesmo snapshot
          - evitar depender de polling lento ou de refresh completo da pagina


          Validacao:

          - ao disparar uma acao pela web, o estado muda automaticamente em tela

          - uma feature/task iniciada nao permanece visivel na coluna de backlog
            se ja existe run em andamento para ela
          - nenhum dos fluxos acima exige F5 para refletir sucesso, erro ou
            transicao intermediaria
        tool: codex
        model: gpt-5.4
        effort: high
        skills:
          - dev-flow
        context:
