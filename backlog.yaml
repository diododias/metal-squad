version: 2
repo: metal-squad
defaults:
  tool: codex
  effort: high
  skills:
    - implement
  stageSkills:
    specify:
      - speckit-specify
    plan:
      - speckit-plan
    tasks:
      - speckit-tasks
    implement:
      - speckit-implement
      - dev-flow
    validate:
      - reviewr
budget:
  maxTokens: 5000000
  maxCostUsd: 100
  perFeatureMaxTokens: 500000
# Backlog reorganizado em 2026-07-10: contem apenas demandas ainda nao
# desenvolvidas (features "Entregue" foram removidas do arquivo executavel).
# Ordem dos epics/features abaixo reflete prioridade: core (skills system,
# observability, developer experience backend) e web primeiro; CLI/TUI
# despriorizado no final. Nao ha demanda web pendente hoje (F32/F34 ja
# entregues em docs/ROADMAP.md) — proxima feature web precisa nascer de um
# novo doc em docs/features/.
# F35 (feat-35) muda a fonte de verdade em runtime: depois dela, msq run/
# status/ui/web leem o catalogo de epics/features/tasks do banco, e este
# backlog.yaml passa a servir so como formato de entrada em batch, carregado
# via `msq backlog load` (comando ainda nao implementado).
epics:
  - id: e01-skills-system
    title: E01 — Skills System (fundacao core)
    features:
      - id: feat-01
        title: F01 — YAML Schema v2
        tool: claude
        model: claude-sonnet-4-5
        effort: medium
        skills:
          - dev-flow
        specFile: docs/features/F01-yaml-schema-v2.md
        context:
          - docs/ROADMAP.md
        dependsOn: []
        tasks: []
        retry:
          maxAttempts: 1
          backoffMs: 5000
          onFail: stop
        workflow:
          mode: staged
          stages:
            - specify
            - plan
            - tasks
            - implement
          approvals:
            channel: telegram
            autoAdvance: false
          syncTasksToBacklog: true
