epics:
  - id: e09-skills-system
    title: E01 — Skills System (Fase 1)
    features:
      - id: feat-41
        title: F01 — YAML Schema v2
        spec: >
          Problema: o backlog ainda depende de convencoes implicitas do spec-kit
          (prompt hardcoded), sem um schema formal que suporte skills
          parametrizadas, arquivos associados a features/tasks e defaults
          reutilizaveis por epic/feature.

          Objetivo: formalizar o schema v2 do backlog.yaml (ja parcialmente em
          uso, ver src/core/backlog/schema.ts) como fonte de verdade
          documentada, cobrindo defaults, skills, context, workflow e budget por
          feature.

          Escopo esperado: src/core/backlog/schema.ts, src/core/backlog/load.ts,
          docs/features/F01-yaml-schema-v2.md para o detalhamento completo.

          Validacao: schema valida backlog.yaml atual sem regressao; testes de
          schema cobrindo casos novos; npm run build, npm test e npm run
          typecheck passam.
        tool: codex
        model: gpt-5.4
        effort: medium
        skills:
          - dev-flow
        specFile: docs/features/F01-yaml-schema-v2.md
        context:
          - docs/features/F01-yaml-schema-v2.md
          - docs/ROADMAP.md
          - .claude/rules/architecture.md
          - src/core/backlog/schema.ts
          - src/core/backlog/load.ts
        dependsOn: []
        retry:
          maxAttempts: 1
          backoffMs: 5000
          onFail: stop
        workflow:
          mode: staged
          stages:
            - specify
            - plan
            - tasks
            - implement
            - validate
          approvals:
            channel: telegram
            autoAdvance: true
          syncTasksToBacklog: true
      - id: feat-42
        title: F02 — Skill Registry
        spec: >
          Problema: skills sao resolvidas de forma parcial no codigo atual, sem
          um registry central com discovery, precedence (repo > global >
          external > builtin) e validacao consistente documentados como contrato
          formal.

          Objetivo: consolidar o skill registry como modulo unico de
          discovery/resolve/validate, base para F03 (dynamic prompt builder) e
          F04 (task sizer, ja entregue).

          Escopo esperado: src/core/skills/, depende do schema v2 (F01) para os
          campos de skills por feature/stage.

          Validacao: precedence testada com casos de conflito
          repo/global/external/builtin; npm run build, npm test e npm run
          typecheck passam.
        tool: codex
        model: gpt-5.4
        effort: medium
        skills:
          - dev-flow
        specFile: docs/features/F02-skill-registry.md
        context:
          - docs/features/F02-skill-registry.md
          - docs/features/F01-yaml-schema-v2.md
          - docs/ROADMAP.md
          - .claude/rules/architecture.md
          - src/core/skills/
        dependsOn:
          - feat-41
        retry:
          maxAttempts: 1
          backoffMs: 5000
          onFail: stop
        workflow:
          mode: staged
          stages:
            - specify
