<svg viewBox="0 0 780 130" xmlns="http://www.w3.org/2000/svg" role="img">
<title>METAL SQUAD</title>
<defs>
  <style>
    .brand { font-family:'IBM Plex Mono','JetBrains Mono',ui-monospace,Menlo,Consolas,monospace; font-weight:700; }
    .sub { font-family:'IBM Plex Mono','JetBrains Mono',ui-monospace,Menlo,Consolas,monospace; }
  </style>
</defs>
<rect width="780" height="130" fill="#0a0a0b"/>
<rect x="40" y="30" width="700" height="70" fill="#151517" stroke="#4a4a4e"/>
<text class="brand" font-size="28" fill="#5fbf6f" x="64" y="76">$</text>
<text class="brand" font-size="30" fill="#d4d4d8" x="100" y="76">METAL</text>
<text class="brand" font-size="30" fill="#d1615f" x="256" y="76">_</text>
<text class="brand" font-size="30" fill="#d4d4d8" x="274" y="76">SQUAD</text>
<rect x="274" y="88" width="180" height="3" fill="#2a2a2d"/>
