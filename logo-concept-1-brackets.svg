<svg viewBox="0 0 760 140" xmlns="http://www.w3.org/2000/svg" role="img">
<title>METAL SQUAD</title>
<defs>
  <style>
    .brand { font-family:'IBM Plex Mono','JetBrains Mono',ui-monospace,Menlo,Consolas,monospace; font-weight:700; }
    .sub { font-family:'IBM Plex Mono','JetBrains Mono',ui-monospace,Menlo,Consolas,monospace; }
  </style>
</defs>
<rect width="760" height="140" fill="#0a0a0b"/>
<g transform="translate(40,80)">
  <text class="brand" x="0" y="0" font-size="56" fill="#d4d4d8">[</text>
  <text class="brand" x="34" y="0" font-size="52" fill="#d4d4d8">METAL</text>
  <text class="brand" x="326" y="0" font-size="52" fill="#5fa8bf">SQUAD</text>
  <text class="brand" x="614" y="0" font-size="56" fill="#d4d4d8">]</text>
  <rect x="0" y="16" width="650" height="3" fill="#2a2a2d"/>
  <text class="sub" x="0" y="40" fill="#4d4d52" font-size="14" letter-spacing="1">msq · orchestrator</text>
  <rect x="656" y="-44" width="14" height="44" fill="#5fa8bf">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</g>
</svg>
